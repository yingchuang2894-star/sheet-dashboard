name: 每日更新看板数据

on:
  schedule:
    # 每天 02:00 UTC = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:   # 允许手动在 GitHub 网页上点击运行

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 下载 Sheet 并生成 data.js
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python sync_data.py

      - name: 提交并推送 data.js（如有变化）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          # 只在 data.js 真的有变化时才 commit，避免产生无意义提交
          git diff --staged --quiet && echo "data.js 无变化，跳过提交" || \
            git commit -m "auto: 更新数据至 $(date -u +%Y-%m-%d)" && git push
