<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>运营数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="data.js"></script>
<style>
:root{
  --bg:#0f1420;--card:#171d2c;--card2:#1d2438;--line:#2a3147;
  --text:#e8ecf4;--sub:#8b93a7;--accent:#4f8cff;--good:#3ddc97;--bad:#ff6868;--warn:#ffb347;
  --t100:#4f8cff;--t200:#3ddc97;--t300:#ffb347;--t500:#b07cff;--coin:#ffd166;
  --g-act:#1a2540;--g-ord:#1a2a20;--g-ret:#261a3a;--g-tier:#2a2010;--g-pay:#1a2530;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);}
header{padding:16px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
header h1{font-size:17px;font-weight:700;letter-spacing:.01em;}
header .sub{color:var(--sub);font-size:11.5px;margin-top:3px;}
.data-range{font-size:11.5px;color:var(--sub);background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:4px 10px;}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
#sync-btn{appearance:none;border:1px solid var(--line);background:var(--card2);color:var(--sub);font-size:12px;font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .18s;}
#sync-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
#sync-btn:disabled{opacity:.5;cursor:not-allowed;}
#sync-btn .spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#sync-toast{position:fixed;bottom:22px;right:24px;background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:12.5px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:999;display:none;max-width:320px;line-height:1.5;}
#sync-toast.ok{border-color:var(--good);color:var(--good);}
#sync-toast.err{border-color:var(--bad);color:var(--bad);}
.tabs{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--line);padding:0 28px;display:flex;gap:0;overflow-x:auto;}
.tab-btn{appearance:none;border:none;border-bottom:2px solid transparent;background:none;color:var(--sub);font-size:13px;font-weight:600;padding:13px 15px;cursor:pointer;white-space:nowrap;transition:color .15s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-page{display:none;}
.tab-page.active{display:block;}
main{padding:22px 28px 60px;max-width:1400px;margin:0 auto;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 15px;}
.card .lbl{color:var(--sub);font-size:11.5px;margin-bottom:5px;}
.card .val{font-size:21px;font-weight:700;display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;}
.card .val small{font-size:11.5px;color:var(--sub);font-weight:400;}
.card .meta{font-size:10.5px;color:var(--sub);margin-top:4px;}
.trend{font-size:11.5px;font-weight:700;}
.trend.up{color:var(--good);}
.trend.down{color:var(--bad);}
.bar-outer{background:var(--line);border-radius:3px;height:4px;margin-top:7px;}
.bar-inner{border-radius:3px;height:4px;background:var(--accent);}
.bar-inner.good{background:var(--good);}
.bar-inner.warn{background:var(--warn);}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin:26px 0 9px;flex-wrap:wrap;gap:7px;}
.sec-title{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;font-weight:700;}
.chart-box{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:15px;margin-bottom:18px;height:280px;}
.chart-box.tall{height:340px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:820px){.grid2{grid-template-columns:1fr;}}
.note{font-size:11px;color:var(--sub);background:var(--card);border:1px dashed var(--line);border-radius:8px;padding:9px 13px;margin-top:28px;line-height:1.65;}
.empty{color:var(--sub);font-size:13px;padding:28px;text-align:center;}

/* Export buttons */
.export-btn{appearance:none;border:1px solid var(--line);background:var(--card2);color:var(--sub);font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .15s;}
.export-btn:hover{border-color:var(--accent);color:var(--accent);}
.export-btn svg{width:12px;height:12px;fill:currentColor;}
.export-grp{display:flex;gap:7px;flex-wrap:wrap;}

/* Tier */
.tier-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;}
.tier-dot.t100{background:var(--t100);}
.tier-dot.t200{background:var(--t200);}
.tier-dot.t300{background:var(--t300);}
.tier-dot.t500{background:var(--t500);}
.tier-dot.coin{background:var(--coin);}
.tier-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;font-size:11.5px;color:var(--sub);align-items:center;}
.tier-select{appearance:none;background:var(--card2);border:1px solid var(--line);color:var(--text);font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;}
.card.t100{border-top:3px solid var(--t100);}
.card.t200{border-top:3px solid var(--t200);}
.card.t300{border-top:3px solid var(--t300);}
.card.t500{border-top:3px solid var(--t500);}
.card.tcoin{border-top:3px solid var(--coin);}
.card.tmember{border-top:3px solid var(--accent);}

/* ── 每日明细大表 ── */
.day-table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin-bottom:20px;}
.day-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);}
.day-table th,.day-table td{padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:right;}
.day-table th:first-child,.day-table td:first-child{text-align:left;position:sticky;left:0;background:var(--card);z-index:2;}
.day-table thead tr:first-child th{background:var(--card2);color:var(--sub);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;text-align:center;position:sticky;top:0;z-index:3;}
.day-table thead tr:first-child th:first-child{text-align:left;}
.day-table thead tr:nth-child(2) th{background:#1a2035;color:var(--sub);font-size:11px;font-weight:600;position:sticky;top:0;z-index:2;}
.day-table thead tr:nth-child(2) th:first-child{background:#1a2035;z-index:4;}
.day-table tbody tr:hover td{background:#1c2540;}
.day-table tbody tr:hover td:first-child{background:#1c2540;}
.day-table td.up{color:var(--good);}
.day-table td.down{color:var(--bad);}
/* 色块分组 */
.day-table th.g-act,.day-table td.g-act{background-color:rgba(26,37,64,.5);}
.day-table th.g-ord,.day-table td.g-ord{background-color:rgba(20,40,28,.5);}
.day-table th.g-pay,.day-table td.g-pay{background-color:rgba(26,37,48,.5);}
.day-table th.g-tier,.day-table td.g-tier{background-color:rgba(40,32,14,.5);}
.day-table th.g-ret,.day-table td.g-ret{background-color:rgba(36,24,52,.5);}
.day-table tbody tr:hover td.g-act{background-color:rgba(40,58,100,.5);}
.day-table tbody tr:hover td.g-ord{background-color:rgba(30,60,42,.5);}
.day-table tbody tr:hover td.g-pay{background-color:rgba(35,55,74,.5);}
.day-table tbody tr:hover td.g-tier{background-color:rgba(65,50,20,.5);}
.day-table tbody tr:hover td.g-ret{background-color:rgba(58,38,80,.5);}
.day-table .date-cell{font-weight:600;font-size:11.5px;}
/* 列组标题色 */
.gh-act{color:var(--accent)!important;}
.gh-ord{color:var(--good)!important;}
.gh-pay{color:var(--warn)!important;}
.gh-tier{color:var(--coin)!important;}
.gh-ret{color:var(--t500)!important;}

/* 月度概览大表 */
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin-bottom:22px;}
.m-table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--card);}
.m-table th,.m-table td{padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:right;}
.m-table th:first-child,.m-table td:first-child{text-align:left;}
.m-table th{color:var(--sub);font-weight:600;background:var(--card2);}
.m-table tbody tr{cursor:pointer;}
.m-table tbody tr:hover{background:#1f273c;}
.m-table td.up{color:var(--good);}
.m-table td.down{color:var(--bad);}
</style>
</head>
<body>

<header>
  <div>
    <h1>运营数据看板</h1>
    <div class="sub">数据来源：Google Sheets · 每日数据登记 / 数据源 / 留存数据</div>
  </div>
  <div class="header-right">
    <div class="data-range" id="header-range">—</div>
    <button id="sync-btn" onclick="triggerSync()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.06-3.39L10 7h5V2l-1.35.35z"/></svg>
      立即同步
    </button>
  </div>
</header>
<div id="sync-toast"></div>

<nav class="tabs" id="tabs"></nav>

<main>
  <!-- 总览 -->
  <section class="tab-page active" id="tab-overview">
    <div class="cards" id="overview-cards"></div>
    <div class="sec-hd">
      <span class="sec-title">月度汇总（点击跳转到对应月份）</span>
      <div class="export-grp">
        <button class="export-btn" onclick="exportCSV('monthly')"><svg viewBox="0 0 16 16"><path d="M8 10.5l-3.5-3.5h2V2h3v5h2L8 10.5zM2 13h12v-2H2v2z"/></svg>导出月度CSV</button>
        <button class="export-btn" onclick="exportCSV('daily')"><svg viewBox="0 0 16 16"><path d="M8 10.5l-3.5-3.5h2V2h3v5h2L8 10.5zM2 13h12v-2H2v2z"/></svg>导出日明细CSV</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="m-table" id="monthly-table">
        <thead><tr>
          <th>月份</th><th>天数</th><th>平均DAU</th><th>DAU环比</th>
          <th>新增注册</th><th>成功订单</th><th>订单充值额</th><th>充值环比</th>
          <th>平均ARPU</th><th>支付成功率</th><th>次留均值</th><th>7留均值</th><th>30留均值</th><th>充值流水</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="sec-hd"><span class="sec-title">月度趋势</span></div>
    <div class="grid2">
      <div class="chart-box"><canvas id="chart-dau"></canvas></div>
      <div class="chart-box"><canvas id="chart-revenue"></canvas></div>
    </div>
  </section>

  <!-- 充值分层 -->
  <section class="tab-page" id="tab-tier">
    <div class="cards" id="tier-overview-cards"></div>
    <div class="sec-hd"><span class="sec-title">月度充值档位堆叠（元）</span></div>
    <div class="chart-box tall"><canvas id="chart-tier-monthly"></canvas></div>
    <div class="sec-hd"><span class="sec-title">月度档位占比趋势</span></div>
    <div class="chart-box"><canvas id="chart-tier-pct"></canvas></div>
    <div class="sec-hd">
      <span class="sec-title">每日档位明细</span>
      <select class="tier-select" id="tier-month-select" onchange="renderTierDailySection(this.value)"></select>
    </div>
    <div class="tier-legend">
      <span><span class="tier-dot t100"></span>100元档</span>
      <span><span class="tier-dot t200"></span>200元档</span>
      <span><span class="tier-dot t300"></span>300元档</span>
      <span><span class="tier-dot t500"></span>500元档</span>
      <span><span class="tier-dot coin"></span>金币充值</span>
    </div>
    <div class="chart-box" id="chart-tier-daily-wrap"><canvas id="chart-tier-daily"></canvas></div>
    <div class="day-table-wrap">
      <table class="day-table" id="table-tier-daily">
        <thead>
          <tr>
            <th>日期</th>
            <th style="color:var(--t100)">100元档</th>
            <th style="color:var(--t200)">200元档</th>
            <th style="color:var(--t300)">300元档</th>
            <th style="color:var(--t500)">500元档</th>
            <th style="color:var(--coin)">金币充值</th>
            <th>会员合计</th><th>总充值额</th><th>会员占比</th>
          </tr>
        </thead>
        <tbody id="tbody-tier-daily"></tbody>
      </table>
    </div>
  </section>

  <!-- 月度分页（由 JS 动态插入） -->
  <div id="month-pages"></div>
  <div class="note" id="data-note"></div>
</main>

<script>
const DATA = DASHBOARD_DATA;
const N  = (v,d=0) => v==null||v===''||Number.isNaN(+v) ? '-' : Number(v).toLocaleString('zh-CN',{maximumFractionDigits:d,minimumFractionDigits:d});
const P  = (v,d=2) => v==null ? '-' : (v*100).toFixed(d)+'%';
const MoM= (c,p)   => (c==null||p==null||p===0) ? null : (c-p)/p;
const TR = v => v===null ? '' : `<span class="trend ${v>=0?'up':'down'}">${v>=0?'↑':'↓'}${(Math.abs(v)*100).toFixed(1)}%</span>`;

document.getElementById('data-note').textContent = DATA.note||'';
const firstDate = DATA.daily[0]?.date;
const lastDate  = DATA.daily[DATA.daily.length-1]?.date;
document.getElementById('header-range').textContent = `数据截至 ${lastDate}`;

// ─── Charts ────────────────────────────────────────────────────────────────
const charts={};
const XAX={ticks:{color:'#8b93a7',font:{size:10},maxRotation:0,autoSkip:true},grid:{color:'#1e2640'}};
const YAX={ticks:{color:'#8b93a7',font:{size:10}},grid:{color:'#1e2640'}};

function destroyChart(k){if(charts[k]){charts[k].destroy();delete charts[k];}}

function lineChart(id,key,labels,datasets,title=''){
  destroyChart(key);
  charts[key]=new Chart(document.getElementById(id).getContext('2d'),{
    type:'line',
    data:{labels,datasets:datasets.map(d=>({tension:.3,pointRadius:0,borderWidth:2,fill:false,...d}))},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#8b93a7',font:{size:11}}},title:{display:!!title,text:title,color:'#e8ecf4',font:{size:12}}},
      scales:{x:XAX,y:YAX}}});
}

function stackedBar(id,key,labels,datasets,title='',pctMode=false){
  destroyChart(key);
  const yOpts=pctMode
    ?{stacked:true,min:0,max:100,ticks:{color:'#8b93a7',font:{size:10},callback:v=>v+'%'},grid:{color:'#1e2640'}}
    :{stacked:true,ticks:{color:'#8b93a7',font:{size:10}},grid:{color:'#1e2640'}};
  charts[key]=new Chart(document.getElementById(id).getContext('2d'),{
    type:'bar',
    data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#8b93a7',font:{size:11}}},title:{display:!!title,text:title,color:'#e8ecf4',font:{size:12}}},
      scales:{x:{stacked:true,...XAX},y:yOpts}}});
}

// ─── CSV ───────────────────────────────────────────────────────────────────
function exportCSV(type){
  const esc=v=>{const s=v==null?'':String(v);return(s.includes(',')||s.includes('"'))?`"${s.replace(/"/g,'""')}"`:`${s}`;};
  let hdr,rows;
  if(type==='monthly'){
    hdr=['月份','天数','平均DAU','新增注册','成功订单','订单充值额','平均ARPU','支付成功率','次留','7留','30留','充值流水','100档','200档','300档','500档','金币','会员卡'];
    rows=DATA.monthly.map(r=>[r.month,r.days,r.dau_avg,r.reg_total,r.orders_total,r.revenue_total,r.arpu_avg,r.pay_success_rate_avg,r.total_d1_avg,r.total_d7_avg,r.total_d30_avg,r.recharge_total??'',r.tier_100_total??'',r.tier_200_total??'',r.tier_300_total??'',r.tier_500_total??'',r.coin_total??'',r.member_total??'']);
  }else{
    hdr=['日期','DAU','安卓DAU','H5 DAU','注册(总)','注册(安卓)','注册(H5)','订单(总)','订单(成功)','订单金额','安卓金额','H5金额','客单价','支付成功率','注册付费率','存量付费率','付费率','ARPU','100档','200档','300档','500档','金币','会员合计','充值流水','次留(安卓)','次留(H5)','次留(合)','3留(安)','3留(H5)','3留(合)','7留(安)','7留(H5)','7留(合)','15留(安)','15留(H5)','15留(合)','30留(安)','30留(H5)','30留(合)'];
    rows=DATA.daily.map(r=>[r.date,r.dau,r.dau_android,r.dau_h5,r.reg,r.reg_android??'',r.reg_h5??'',r.orders??'',r.orders_success,r.revenue,r.revenue_android??'',r.revenue_h5??'',r.aov??'',r.pay_success_rate,r.reg_pay_rate??'',r.retention_pay_rate??'',r.pay_rate??'',r.arpu??'',r.tier_100??'',r.tier_200??'',r.tier_300??'',r.tier_500??'',r.coin_revenue??'',r.member_revenue??'',r.recharge??'',r.android_d1??'',r.h5_d1??'',r.total_d1??'',r.android_d3??'',r.h5_d3??'',r.total_d3??'',r.android_d7??'',r.h5_d7??'',r.total_d7??'',r.android_d15??'',r.h5_d15??'',r.total_d15??'',r.android_d30??'',r.h5_d30??'',r.total_d30??'']);
  }
  const csv=[hdr,...rows].map(r=>r.map(esc).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`运营看板_${type}_${lastDate}.csv`;a.click();
}
function exportMonthCSV(month){
  const recs=DATA.daily.filter(r=>r.month===month);
  const esc=v=>{const s=v==null?'':String(v);return(s.includes(',')||s.includes('"'))?`"${s.replace(/"/g,'""')}"`:`${s}`;};
  const hdr=['日期','DAU','安卓DAU','H5 DAU','注册(总)','注册(安卓)','注册(H5)','订单(总)','订单(成功)','订单金额','安卓金额','H5金额','客单价','支付成功率','注册付费率','存量付费率','付费率','ARPU','100档','200档','300档','500档','金币','会员合计','充值流水','次留(安)','次留(H5)','次留(合)','3留(安)','3留(H5)','3留(合)','7留(安)','7留(H5)','7留(合)','15留(安)','15留(H5)','15留(合)','30留(安)','30留(H5)','30留(合)'];
  const rows=recs.map(r=>[r.date,r.dau,r.dau_android,r.dau_h5,r.reg,r.reg_android??'',r.reg_h5??'',r.orders??'',r.orders_success,r.revenue,r.revenue_android??'',r.revenue_h5??'',r.aov??'',r.pay_success_rate,r.reg_pay_rate??'',r.retention_pay_rate??'',r.pay_rate??'',r.arpu??'',r.tier_100??'',r.tier_200??'',r.tier_300??'',r.tier_500??'',r.coin_revenue??'',r.member_revenue??'',r.recharge??'',r.android_d1??'',r.h5_d1??'',r.total_d1??'',r.android_d3??'',r.h5_d3??'',r.total_d3??'',r.android_d7??'',r.h5_d7??'',r.total_d7??'',r.android_d15??'',r.h5_d15??'',r.total_d15??'',r.android_d30??'',r.h5_d30??'',r.total_d30??'']);
  const csv=[hdr,...rows].map(r=>r.map(esc).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`运营看板_${month}.csv`;a.click();
}

// ─── Tabs ──────────────────────────────────────────────────────────────────
const renderedMonths=new Set();
function renderTabs(){
  const el=document.getElementById('tabs');
  const tabs=[{id:'overview',label:'总览'},{id:'tier',label:'充值分层'},...DATA.monthly.map(r=>({id:r.month,label:r.month}))];
  el.innerHTML=tabs.map(t=>`<button class="tab-btn" data-tab="${t.id}">${t.label}</button>`).join('');
  el.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
}
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.toggle('active',p.id===`tab-${id}`));
  if(id==='tier') renderTierOverview();
  else if(id!=='overview'&&!renderedMonths.has(id)){renderMonthBlock(id);renderedMonths.add(id);}
  window.scrollTo({top:0});
}

function renderOverviewCards(){

  const reg=m.reduce((s,r)=>s+(r.reg_total||0),0);
  const days=m.reduce((s,r)=>s+(r.days||0),0);
  const avgD=m.reduce((s,r)=>s+(r.dau_avg||0)*(r.days||0),0)/days;
  const lat=m[m.length-1],prv=m[m.length-2];

  if(t&&t.goal){

    tcHtml=`<div class="card"><div class="lbl">${lbl} 充值目标进度</div><div class="val">${P(rate,1)} <small>${t.status||''}</small></div><div class="meta">目标 ${N(t.goal)} · 已完成 ${N(t.completed)}</div><div class="bar-outer"><div class="bar-inner ${cls}" style="width:${Math.min(rate*100,100).toFixed(0)}%"></div></div></div>`;

function renderMonthlyTable(){

// ─── 手动同步 ──────────────────────────────────────────────────────────────
// 部署 Cloudflare Worker 后，把下面的 URL 换成你的 Worker 地址
const WORKER_URL = "https://sheet-dashboard-trigger.YOURNAME.workers.dev";
const COOLDOWN = 5 * 60 * 1000; // 5 分钟冷却

function toast(msg, type='', ms=4000){
  const el=document.getElementById('sync-toast');
  el.textContent=msg; el.className=type; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.style.display='none';},ms);
}

async function triggerSync(){
  if(WORKER_URL.includes('YOURNAME')){
    toast('⚠️ 请先部署 Cloudflare Worker 并填入 Worker 地址','err',5000);
    return;
  }
  const lastTrigger=+localStorage.getItem('lastSync')||0;
  const remain=Math.ceil((COOLDOWN-(Date.now()-lastTrigger))/1000);
  if(remain>0){toast(`请等待 ${remain} 秒后再次同步`,'',3000);return;}

  const btn=document.getElementById('sync-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>同步中...';
  toast('正在触发同步，数据约 60 秒后更新…','',60000);

  try{
    const r=await fetch(WORKER_URL,{method:'POST'});
    const j=await r.json();
    if(j.ok){
      localStorage.setItem('lastSync',Date.now());
      toast('✅ 同步已触发！60 秒后刷新页面即可看到最新数据。','ok',10000);
      setTimeout(()=>location.reload(),65000);
    }else{
      toast(`同步失败（HTTP ${j.status}），请稍后重试`,'err',5000);
    }
  }catch(e){
    toast('网络错误，请检查 Worker 地址是否正确','err',5000);
  }finally{
    btn.disabled=false;
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.06-3.39L10 7h5V2l-1.35.35z"/></svg>立即同步';
  }
}
